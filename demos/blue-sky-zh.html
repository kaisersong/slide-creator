<script>
/* ═══════════════════════════════════════════════════════════════
   BLUE SKY NAVIGATION + ORB CONTROLLER
   ═══════════════════════════════════════════════════════════════

   orbPositions: one entry per slide.
   Each entry: [orb1-left%, orb1-top%, orb1-size(px),
                orb2-left%, orb2-top%, orb2-size(px),
                orb3-left%, orb3-top%, orb3-size(px)]

   Design guide:
   - Cover / chapter slides: orbs in dramatic corner positions
   - Content slides: one orb top-left, one bottom-right, one center
   - Dense data slides: keep orbs away from center to not compete with text

   ═══════════════════════════════════════════════════════════════ */
const orbPositions = [
  /* Slide 1 — Cover: dramatic spread */
  [-15, -20, 500,   80, -10, 400,   50,  65, 350],
  /* Slide 2 — Chapter: horizontal row across middle */
  [ 10,  30, 460,   45,  20, 380,   75,  40, 320],
  /* Slide 3 — Content: top-left + bottom-right */
  [-20,  40, 460,   75, -15, 400,   55,  70, 300],
  /* Add one entry per additional slide, following the same pattern */
  /* Slide 4  */ [-10, 20, 480,  70, 10, 400, 50, 65, 290],
  /* Slide 5  */ [ 65,-10, 460, -15, 55, 380, 40, 80, 310],
  /* Slide 6  */ [-15, 35, 500,  75,  0, 420, 55, 65, 290],
  /* Slide 7  */ [ 65, 15, 440, -15, 60, 380, 40, 80, 300],
  /* Slide 8  */ [-10, 25, 480,  80,-10, 400, 50, 70, 310],
  /* Slide 9  */ [ 70,  5, 460, -15, 60, 380, 45, 75, 300],
  /* Slide 10 */ [-15,-20, 500,  80,-10, 400, 50, 60, 350],
];

(function () {
  const TOTAL  = document.querySelectorAll('#track .slide').length;
  const track  = document.getElementById('track');
  const dotsEl = document.getElementById('nav-dots');
  const ctrEl  = document.getElementById('slide-counter');
  const o1     = document.getElementById('orb1');
  const o2     = document.getElementById('orb2');
  const o3     = document.getElementById('orb3');
  let   cur    = 0;

  /* Update CSS custom property so slide widths stay correct */
  document.documentElement.style.setProperty('--slide-count', TOTAL);

  /* Build pagination dots */
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('button');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.setAttribute('aria-label', 'Slide ' + (i + 1));
    d.addEventListener('click', () => go(i));
    dotsEl.appendChild(d);
  }

  /* Move orbs to position for slide i */
  function setOrbs(i) {
    const p = orbPositions[i] || orbPositions[0];
    const set = (el, l, t, s) => {
      el.style.left = l + '%'; el.style.top = t + '%';
      el.style.width = el.style.height = s + 'px';
    };
    set(o1, p[0], p[1], p[2]);
    set(o2, p[3], p[4], p[5]);
    set(o3, p[6], p[7], p[8]);
  }

  /* Navigate to slide index n */
  function go(n) {
    if (n < 0 || n >= TOTAL) return;
    document.querySelectorAll('#track .slide')[cur].classList.remove('active');
    cur = n;
    document.querySelectorAll('#track .slide')[cur].classList.add('active');
    track.style.transform = `translateX(-${cur * 100}vw)`;
    document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === cur));
    ctrEl.textContent = String(cur + 1).padStart(2, '0') + ' / ' + String(TOTAL).padStart(2, '0');
    setOrbs(cur);
  }

  /* Init */
  go(0);

  /* Keyboard */
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'ArrowDown') { e.preventDefault(); go(cur + 1); }
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')                    { e.preventDefault(); go(cur - 1); }
    if (e.key === 'Home') go(0);
    if (e.key === 'End')  go(TOTAL - 1);
  });

  /* Wheel — debounce-reset lock.
     Inertia events keep resetting the 180ms timer; the lock releases only after
     the gesture truly ends. Prevents trackpad inertia from double-navigating. */
  let wheelLocked = false, wheelTimer = null;
  document.addEventListener('wheel', e => {
    clearTimeout(wheelTimer);
    if (!wheelLocked) { wheelLocked = true; e.deltaY > 0 ? go(cur + 1) : go(cur - 1); }
    wheelTimer = setTimeout(() => { wheelLocked = false; }, 180);
  }, { passive: true });

  /* Touch swipe */
  let touchStartX = 0;
  document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  document.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) dx < 0 ? go(cur + 1) : go(cur - 1);
  });
})();
</script>
